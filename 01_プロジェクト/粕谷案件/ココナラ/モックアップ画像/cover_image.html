<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>ココナラ カバー画像</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Caveat:wght@400;600&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 420px;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    background: #fff;
    margin: 0;
    padding: 0;
  }

  .cover {
    width: 1280px;
    height: 420px;
    background: url('cover_bg.png') center center / cover no-repeat;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* 背景オーバーレイ（文字の視認性確保） */
  .cover::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      to right,
      rgba(255,255,255,0.75) 0%,
      rgba(255,255,255,0.6) 35%,
      rgba(255,255,255,0.85) 50%,
      rgba(255,255,255,0.92) 100%
    );
    z-index: 0;
  }

  /* ===== 左側：モックアップエリア ===== */
  .mockups-area {
    width: 480px;
    height: 100%;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-left: 30px;
    gap: 8px;
  }

  .phone-mockup {
    position: relative;
    width: 105px;
    flex-shrink: 0;
  }

  .phone-mockup:nth-child(1) { transform: rotate(-5deg) translateY(8px); z-index: 1; }
  .phone-mockup:nth-child(2) { transform: rotate(-2deg) translateY(-12px); z-index: 3; }
  .phone-mockup:nth-child(3) { transform: rotate(2deg) translateY(-8px); z-index: 2; }
  .phone-mockup:nth-child(4) { transform: rotate(5deg) translateY(12px); z-index: 1; }

  .phone-frame {
    width: 100%;
    background: #1a1a1a;
    border-radius: 18px;
    padding: 6px 4px;
    box-shadow:
      0 8px 24px rgba(0,0,0,0.12),
      0 2px 8px rgba(0,0,0,0.08);
  }

  .phone-notch {
    width: 32px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    margin: 0 auto 4px;
  }

  .phone-screen {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }

  .phone-home {
    width: 18px;
    height: 3px;
    background: #555;
    border-radius: 2px;
    margin: 4px auto 0;
  }

  .text-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 12px 40px 12px 40px;
    position: relative;
    z-index: 1;
  }

  /* タグラベル */
  .tags {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
  }

  .tag {
    display: inline-block;
    padding: 4px 14px;
    border: 1.5px solid #2d3748;
    border-radius: 2px;
    font-size: 12px;
    font-weight: 500;
    color: #2d3748;
    letter-spacing: 0.08em;
    background: rgba(255,255,255,0.8);
  }

  /* メインコピー */
  .main-copy {
    font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #1a202c;
    line-height: 1.15;
    letter-spacing: 0.02em;
    margin-bottom: 0;
  }

  .main-copy .accent {
    color: #e67e22;
    font-weight: 900;
  }

  .main-copy .period {
    color: #e67e22;
    font-size: 44px;
  }

  /* 手書き風アクセント */
  .handwritten {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #bcbcbc;
    transform: rotate(-3deg);
    margin-left: 8px;
    display: inline-block;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  .sub-copy {
    font-size: 15px;
    color: #475569;
    letter-spacing: 0.02em;
    line-height: 1.6;
    margin-top: 5px;
    white-space: nowrap; /* 1行に強制 */
  }

  .sub-copy .highlight {
    color: #e67e22;
    font-weight: 900;
    font-size: 22px;
    margin: 0 4px;
  }



  /* 装飾 */
  .corner-accent {
    position: absolute;
    top: 18px;
    left: 18px;
    width: 35px;
    height: 35px;
    border-left: 2px solid rgba(230, 126, 34, 0.25);
    border-top: 2px solid rgba(230, 126, 34, 0.25);
    z-index: 0;
  }

  .deco-line {
    position: absolute;
    bottom: 25px;
    right: 35px;
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, transparent, #e67e22);
  }

  .deco-line::after {
    content: '';
    position: absolute;
    right: 0;
    top: -3px;
    width: 8px;
    height: 8px;
    background: #e67e22;
    border-radius: 50%;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="corner-accent"></div>

  <!-- 左側：スマホモックアップ群 -->
  <div class="mockups-area">
    <div class="phone-mockup">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <img src="sp_hamburger.png" alt="ハンバーガーショップLP">
        </div>
        <div class="phone-home"></div>
      </div>
    </div>
    <div class="phone-mockup">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <img src="sp_paint.png" alt="外壁塗装LP">
        </div>
        <div class="phone-home"></div>
      </div>
    </div>
    <div class="phone-mockup">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <img src="sp_tsumugi.png" alt="訪問介護LP">
        </div>
        <div class="phone-home"></div>
      </div>
    </div>
    <div class="phone-mockup">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <img src="sp_aeris.png" alt="カフェLP">
        </div>
        <div class="phone-home"></div>
      </div>
    </div>
  </div>

  <!-- 右側：テキスト -->
  <div class="text-area">
    <div class="tags">
      <span class="tag">超特急デモ提示</span>
      <span class="tag">集客導線設計</span>
      <span class="tag">SEO＆分析つき</span>
    </div>

    <div class="main-copy">
      <span class="accent">集客に強い</span><br>
      LP・Webサイト制作<span class="period"></span>
    </div>

    <span class="handwritten">Landing Page Design</span>

    <div class="sub-copy">
      デザイン画の待ち時間ゼロ。<span class="highlight">最短3日</span>でブラウザで動くデモを提示。生きたサイトを構築します。
    </div>


  </div>

  <div class="deco-line"></div>
</div>
</body>
</html>
