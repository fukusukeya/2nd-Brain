<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1220px;
    height: 1024px;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-image: url('file:///Users/kasuyatooru/Product/2nd-Brain/01_プロジェクト/粕谷案件/ココナラ/モックアップ画像/cover_bg.png');
    background-size: cover;
    background-position: center bottom;
    color: #2d3748;
    position: relative;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.85); /* Strong white wash */
    z-index: 1;
  }
  
  /* Geometric Accent */
  .accent-shape {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: rgba(230, 126, 34, 0.05);
    border-radius: 50%;
    z-index: 2;
  }

  .content-wrapper {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10;
    padding: 60px;
    box-sizing: border-box;
  }

  /* TOP SECTION */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .badge-container {
    width: 150px;
    height: 150px;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    font-weight: bold;
    box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
    border: 5px solid #fff;
    transform: rotate(-10deg);
    margin-top: 10px;
    margin-left: 30px;
    z-index: 20;
    position: relative;
  }
  .badge-top { font-size: 16px; letter-spacing: 0.1em; }
  .badge-main { font-size: 32px; margin: 2px 0; line-height: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
  .badge-bottom { font-size: 15px; }

  /* MAIN TYPOGRAPHY */
  .title-section {
    position: absolute;
    top: 170px;
    left: 70px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .sub-catch {
    font-size: 32px;
    font-weight: 800;
    color: #e67e22;
    letter-spacing: 0.1em;
    margin-bottom: -10px;
    background: #fff;
    padding: 8px 20px;
    border-left: 8px solid #e67e22;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
    z-index: 5;
    position: relative;
  }
  .main-title-box {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    z-index: 4;
  }
  .main-lp {
    font-family: 'Times New Roman', Times, serif; 
    font-size: 260px;
    font-weight: 900;
    color: #2F3B4A;
    line-height: 1;
    margin: 0;
    letter-spacing: -0.05em;
    text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
  }
  .main-seisaku {
    font-size: 70px;
    font-weight: 900;
    letter-spacing: 0.05em;
    margin-top: -40px;
    margin-left: 10px;
    color: #2F3B4A;
    text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
  }

  /* FEATURES LIST (Right side) */
  .features {
    position: absolute;
    top: 220px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: flex-end;
  }
  .feature-item {
    background: #2F3B4A;
    color: #fff;
    font-size: 34px;
    font-weight: 800;
    padding: 16px 40px 16px 30px;
    border-radius: 8px 0 0 8px; 
    box-shadow: -5px 8px 15px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    position: relative;
    clip-path: polygon(0 0, 100% 0, 96% 50%, 100% 100%, 0 100%);
    width: 530px;
  }
  .feature-item:nth-child(2) { margin-right: 15px; width: 510px; background: #3c495c; }
  .feature-item:nth-child(3) { margin-right: 30px; width: 490px; background: #4a5a70; }
  .feature-icon {
    color: #e67e22;
    font-size: 40px;
    margin-right: 15px;
    font-weight: 900;
  }

  /* MOCKUPS */
  .mockups {
    position: absolute;
    bottom: -30px;
    left: 50px;
    display: flex;
    align-items: flex-end;
    gap: 30px;
  }
  .mockup-img {
    width: 250px;
    height: 480px;
    object-fit: cover;
    object-position: top center;
    border-radius: 20px 20px 0 0;
    border: 8px solid #2d3748;
    border-bottom: none;
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
    background: #fff;
  }
  .mockup1 { z-index: 3; transform: scale(1) rotate(-3deg); }
  .mockup2 { z-index: 5; transform: scale(1.1) translateY(-20px); }
  .mockup3 { z-index: 2; transform: scale(0.95) translateY(20px) rotate(3deg); }

  /* PRICE SECTION */
  .price-box {
    position: absolute;
    bottom: 30px;
    right: 40px;
    text-align: right;
    z-index: 20;
    background: rgba(255,255,255,0.95);
    padding: 10px 30px 10px 40px;
    border-radius: 80px;
    box-shadow: 0 10px 25px rgba(230,126,34,0.3);
    border: 5px solid #e67e22;
  }
  .price-label {
    font-size: 20px;
    font-weight: bold;
    color: #2F3B4A;
    margin-bottom: 0px;
    letter-spacing: 0.05em;
  }
  .price-number {
    font-size: 130px;
    font-weight: 900;
    color: #e53e3e;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: -0.05em;
    line-height: 1;
    text-shadow: 2px 2px 0px rgba(229, 62, 62, 0.2);
  }
  .price-yen {
    font-size: 40px;
    font-weight: bold;
    color: #e53e3e;
    margin-left: -5px;
  }
</style>
</head>
<body>
  <div class="overlay"></div>
  <div class="accent-shape"></div>
  
  <div class="content-wrapper">
    <div class="header">
      <div class="badge-container">
        <div class="badge-top">デザイン面</div>
        <div class="badge-main">待ち</div>
        <div class="badge-bottom">時間ゼロ</div>
      </div>
    </div>

    <div class="title-section">
      <div class="sub-catch">戦略設計のプロが作成</div>
      <div class="main-title-box">
        <span class="main-lp">LP</span>
        <span class="main-seisaku">・Web制作</span>
      </div>
    </div>

    <div class="features">
      <div class="feature-item">
        <span class="feature-icon">✓</span>
        最短3日で動くデモ提示
      </div>
      <div class="feature-item">
        <span class="feature-icon">✓</span>
        スマホ最適化＆SEO対策
      </div>
      <div class="feature-item">
        <span class="feature-icon">✓</span>
        オリジナルデザイン
      </div>
    </div>

    <div class="mockups">
      <img class="mockup-img mockup1" src="file:///Users/kasuyatooru/Product/2nd-Brain/01_プロジェクト/粕谷案件/ココナラ/モックアップ画像/sp_hamburger.png" />
      <img class="mockup-img mockup2" src="file:///Users/kasuyatooru/Product/2nd-Brain/01_プロジェクト/粕谷案件/ココナラ/モックアップ画像/sp_paint.png" />
      <img class="mockup-img mockup3" src="file:///Users/kasuyatooru/Product/2nd-Brain/01_プロジェクト/粕谷案件/ココナラ/モックアップ画像/sp_aeris.png" />
    </div>

    <div class="price-box">
      <div class="price-label">集客にコミットする高品質設計</div>
      <span class="price-number">55,000</span>
      <span class="price-yen">円〜</span>
    </div>

  </div>
</body>
</html>
