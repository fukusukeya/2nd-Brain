<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1220px;
    height: 1024px;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-image: url('file:///Users/kasuyatooru/Product/2nd-Brain/01_プロジェクト/粕谷案件/ココナラ/モックアップ画像/cover_bg.png');
    background-size: cover;
    background-position: center bottom;
    color: #2d3748;
    position: relative;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.85);
    z-index: 1;
  }
  .accent-shape {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: rgba(230, 126, 34, 0.04);
    border-radius: 50%;
    z-index: 2;
  }
  .content-wrapper {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10;
    padding: 60px;
    box-sizing: border-box;
  }

  /* BADGE */
  .badge-container {
    width: 130px;
    height: 130px;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    font-weight: bold;
    box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
    border: 5px solid #fff;
    transform: rotate(-10deg);
    position: absolute;
    top: 30px;
    left: 40px;
    z-index: 20;
  }
  .badge-top { font-size: 13px; letter-spacing: 0.1em; margin-bottom:-2px;}
  .badge-main { font-size: 30px; margin: 0; line-height: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
  .badge-bottom { font-size: 14px; margin-top: 2px;}

  /* TYPOGRAPHY */
  .title-section {
    position: absolute;
    top: 150px;
    left: 70px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .sub-catch {
    font-size: 34px;
    font-weight: 800;
    color: #e67e22;
    letter-spacing: 0.1em;
    margin-bottom: -10px;
    background: #fff;
    padding: 8px 20px;
    border-left: 8px solid #e67e22;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
    z-index: 5;
    position: relative;
  }
  .main-title-box {
    display: flex;
    flex-direction: row;
    align-items: baseline;
    z-index: 4;
  }
  .main-lp {
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; 
    font-size: 190px;
    font-weight: 900;
    color: #2F3B4A;
    line-height: 1;
    margin: 0;
    letter-spacing: -0.05em;
    text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
  }
  .main-seisaku {
    font-size: 70px;
    font-weight: 900;
    letter-spacing: 0.05em;
    margin-left: 10px;
    color: #2F3B4A;
    text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
  }

  /* FEATURES LIST */
  .features {
    position: absolute;
    top: 170px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: flex-end;
  }
  .feature-item {
    background: #2F3B4A;
    color: #fff;
    font-size: 28px;
    font-weight: 800;
    padding: 16px 40px 16px 25px;
    border-radius: 8px 0 0 8px; 
    box-shadow: -5px 8px 15px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    position: relative;
    clip-path: polygon(0 0, 100% 0, 96% 50%, 100% 100%, 0 100%);
    width: 530px;
  }
  .feature-item:nth-child(2) { margin-right: 15px; width: 540px; background: #3c495c; }
  .feature-item:nth-child(3) { margin-right: 30px; width: 510px; background: #4a5a70; }
  .feature-icon {
    color: #e67e22;
    font-size: 40px;
    margin-right: 15px;
    font-weight: 900;
  }

  /* MOCKUPS */
  .mockups {
    position: absolute;
    bottom: 20px;
    left: 40px;
    display: flex;
    align-items: flex-end;
    gap: -40px;
  }
  .mockup-img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
    border: 8px solid #fff;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    background: #fff;
  }
  .mockup1 { z-index: 3; transform: scale(1.1) rotate(-6deg); margin-right: -40px; }
  .mockup2 { z-index: 4; transform: scale(1.15) translateY(-30px); margin-right: -40px; }
  .mockup3 { z-index: 2; transform: scale(1.0) translateY(10px) rotate(5deg); }

  /* PRICE SECTION */
  .price-box {
    position: absolute;
    bottom: 50px;
    right: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: rgba(255,255,255,0.95);
    padding: 18px 45px 22px 45px;
    border-radius: 80px;
    box-shadow: 0 10px 25px rgba(230,126,34,0.3);
    border: 5px solid #e67e22;
  }
  .price-label {
    font-size: 22px;
    font-weight: bold;
    color: #2F3B4A;
    margin-bottom: 5px;
    letter-spacing: 0.1em;
  }
  .price-value-container {
    display: flex;
    align-items: baseline;
    justify-content: center;
  }
  .price-number {
    font-size: 110px;
    font-weight: 900;
    color: #e53e3e;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: -0.05em;
    line-height: 0.9;
    text-shadow: 2px 2px 0px rgba(229, 62, 62, 0.2);
  }
  .price-yen {
    font-size: 40px;
    font-weight: bold;
    color: #e53e3e;
    margin-left: 5px;
  }
</style>
</head>
<body>
  <div class="overlay"></div>
  <div class="accent-shape"></div>
  
  <div class="content-wrapper">
    <div class="header">
      <div class="badge-container">
        <div class="badge-top">商用利用</div>
        <div class="badge-main">完全</div>
        <div class="badge-bottom">OK</div>
      </div>
    </div>

    <div class="title-section">
      <div class="sub-catch">ブランドの顔となる</div>
      <div class="main-title-box">
        <span class="main-lp">ロゴ</span>
        <span class="main-seisaku">制作</span>
      </div>
    </div>

    <div class="features">
      <div class="feature-item">
        <span class="feature-icon">✓</span>
        ヒアリングからコンセプト設計
      </div>
      <div class="feature-item">
        <span class="feature-icon">✓</span>
        名刺やWebに使える各種データ納品
      </div>
      <div class="feature-item">
        <span class="feature-icon">✓</span>
        ご納得いくまでデザイン調整
      </div>
    </div>

    <div class="mockups">
      <img class="mockup-img mockup1" src="file:///Users/kasuyatooru/.gemini/antigravity/brain/855451b6-e7b0-4411-8c22-f70b0a8a979e/logo_mockup_corporate_1775201474765.png" />
      <img class="mockup-img mockup2" src="file:///Users/kasuyatooru/Product/2nd-Brain/01_プロジェクト/粕谷案件/ココナラ/モックアップ画像/00_プロフィール画像.png" />
      <img class="mockup-img mockup3" src="file:///Users/kasuyatooru/.gemini/antigravity/brain/855451b6-e7b0-4411-8c22-f70b0a8a979e/logo_mockup_cafe_1775201532429.png" />
    </div>

    <div class="price-box">
      <div class="price-label">想いをカタチにするプロデザイン</div>
      <div class="price-value-container">
        <span class="price-number">20,000</span>
        <span class="price-yen">円〜</span>
      </div>
    </div>

  </div>
</body>
</html>
